name: Lint rule packs

on:
  pull_request:
    paths:
      - "rules/**"
      - "tools/lint_rules.py"
      - "tools/requirements.txt"
      - ".github/workflows/lint-rules.yml"
  push:
    branches: [main]
    paths:
      - "rules/**"
      - "tools/lint_rules.py"
      - "tools/requirements.txt"
      - ".github/workflows/lint-rules.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements.txt
      - run: pip install -r tools/requirements.txt
      - run: python tools/lint_rules.py rules/
